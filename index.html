<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JESUS YOUTH KMC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; }
    
    /* Test hero with your image */
    .hero {
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      position: relative;
    }
    
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
    }
    
    .hero-content {
      position: relative;
      z-index: 1;
      padding: 3rem;
    }
    
    h1 { font-size: 3rem; margin-bottom: 1rem; }
    .btn { background: gold; color: black; padding: 1rem 2rem; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 1rem; }
    
    /* Debug info */
    .debug {
      background: #f0f0f0;
      padding: 1rem;
      margin: 1rem;
      border-radius: 10px;
      font-family: monospace;
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-content">
    <h1>🔥 JESUS YOUTH KMC 🔥</h1>
    <p>Every Wednesday 4:30 PM @ St. Luke Convent</p>
    <a href="#" class="btn">Join Worship</a>
  </div>
</div>

<div class="debug">
  <strong>🔍 Debug Info:</strong><br>
  Looking for image: <code>bg.jpg</code><br>
  <span id="imageStatus">Checking...</span>
</div>

<script>
  // Test if image exists
  const img = new Image();
  img.onload = function() {
    document.getElementById('imageStatus').innerHTML = '✅ Image FOUND! bg.jpg loaded successfully.';
    document.getElementById('imageStatus').style.color = 'green';
  };
  img.onerror = function() {
    document.getElementById('imageStatus').innerHTML = '❌ Image NOT FOUND! Make sure the file name is EXACTLY "bg.jpg" (all lowercase) and both files are in the same folder.';
    document.getElementById('imageStatus').style.color = 'red';
  };
  img.src = 'bg.jpg';
</script>

</body>
</html>
