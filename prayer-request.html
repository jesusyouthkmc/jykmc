<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prayer Requests | Jesus Youth KMC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ----- reset / base ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      overflow: hidden;          /* prevent page scroll */
    }
    body {
      background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 50%, #F25E2C 100%);
      font-family: system-ui, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;       /* vertical center */
      justify-content: center;
    }

    /* main container – exactly viewport height, no scroll */
    .main-container {
      height: 100vh;
      width: 100%;
      max-width: 640px;          /* comfortable reading width */
      margin: 0 auto;
      padding: 0.5rem 1rem 0.5rem 1rem;
      display: flex;
      flex-direction: column;
      justify-content: center;   /* center card vertically */
    }

    /* glass card – flex column so we can shrink content */
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 1.2rem 1.8rem 1.5rem 1.8rem;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      flex: 0 1 auto;           /* shrink if needed */
      max-height: calc(100vh - 2rem); /* avoid touching edges */
    }

    /* back button – right aligned, compact */
    .back-wrapper {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 0.3rem;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.85);
      transition: color 0.2s;
      font-weight: 500;
      font-size: 0.95rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
    }
    .back-btn:hover {
      color: white;
    }

    /* header – compact */
    .form-header {
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .form-header i {
      font-size: 2.2rem;
      color: #e05a1a;
      margin-bottom: 0.1rem;
    }
    .form-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1f2937;
      line-height: 1.2;
    }
    .form-header p {
      font-size: 0.85rem;
      color: #4b5563;
      margin-top: 0.1rem;
    }

    /* form elements – tighter spacing */
    .field-group {
      margin-bottom: 0.5rem;
    }
    .field-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1f2937;
      display: block;
      margin-bottom: 0.15rem;
    }
    .input-field {
      width: 100%;
      padding: 8px 12px;
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      outline: none;
      font-family: inherit;
      background: white;
    }
    .input-field:focus {
      border-color: #FF8C42;
      box-shadow: 0 0 0 3px rgba(255, 140, 66, 0.2);
    }
    textarea.input-field {
      resize: none;
      min-height: 60px;         /* reduced from 5 rows */
      padding: 8px 12px;
    }
    .optional-badge {
      font-size: 0.65rem;
      font-weight: 400;
      background: #e5e7eb;
      padding: 1px 8px;
      border-radius: 20px;
      margin-left: 6px;
    }
    .hint-text {
      font-size: 0.65rem;
      color: #9ca3af;
      margin-top: 0.1rem;
    }

    /* submit button – compact */
    .submit-btn {
      background: linear-gradient(135deg, #FF8C42, #FF6B35);
      transition: all 0.2s ease;
      width: 100%;
      color: white;
      font-weight: 700;
      padding: 10px 0;
      border-radius: 16px;
      border: none;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      margin-top: 0.3rem;
    }
    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px -5px rgba(0,0,0,0.2);
    }

    /* success / error messages – compact */
    #successMessage, #errorMessage {
      margin-top: 0.5rem;
      font-size: 0.85rem;
    }
    .success-box {
      background: #d1fae5;
      color: #065f46;
      padding: 0.5rem 0.8rem;
      border-radius: 14px;
      text-align: center;
      font-weight: 500;
    }
    .verse-card {
      background: linear-gradient(135deg, #fef3e8, #fff5eb);
      border-left: 4px solid #FF8C42;
      padding: 0.5rem 0.9rem;
      border-radius: 14px;
      margin-top: 0.4rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .verse-card i {
      font-size: 1.2rem;
      color: #e05a1a;
      margin-top: 0.1rem;
    }
    .verse-card p {
      font-size: 0.8rem;
      line-height: 1.4;
      color: #374151;
      font-style: italic;
    }
    .verse-card .ref {
      font-size: 0.7rem;
      font-weight: 600;
      color: #e05a1a;
      margin-top: 0.1rem;
      font-style: normal;
    }
    #errorMessage {
      background: #fee2e2;
      color: #991b1b;
      padding: 0.4rem 0.8rem;
      border-radius: 14px;
      text-align: center;
    }

    /* footer scripture – tiny */
    .footer-verse {
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 0.65rem;
      margin-top: 0.4rem;
      line-height: 1.3;
    }

    /* fade-in animation */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up {
      animation: fadeInUp 0.35s ease forwards;
    }

    /* hidden utility */
    .hidden {
      display: none !important;
    }

    /* small screens: even tighter */
    @media (max-height: 700px) {
      .glass-card { padding: 0.8rem 1.2rem 1rem 1.2rem; }
      .form-header h1 { font-size: 1.3rem; }
      .form-header i { font-size: 1.8rem; }
      textarea.input-field { min-height: 48px; }
      .input-field { padding: 6px 10px; font-size: 0.8rem; }
      .submit-btn { padding: 8px 0; font-size: 0.85rem; }
      .verse-card p { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <!-- Back button – right, says "Back" -->
    <div class="back-wrapper">
      <button onclick="window.history.back()" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back
      </button>
    </div>

    <!-- Glass card – compact -->
    <div class="glass-card">
      <!-- header -->
      <div class="form-header">
        <i class="fas fa-hands-praying"></i>
        <h1>Prayer Request</h1>
        <p>Our Intercession Ministry will pray for you</p>
      </div>

      <!-- form -->
      <form id="prayerForm">
        <div class="field-group">
          <label>
            Your Name
            <span class="optional-badge">Optional</span>
          </label>
          <input type="text" id="name" class="input-field" placeholder="Enter your name (or leave blank)" />
          <div class="hint-text">Leave blank to submit anonymously</div>
        </div>

        <div class="field-group" style="margin-bottom: 0.3rem;">
          <label>Prayer Request *</label>
          <textarea id="prayerRequest" rows="2" class="input-field" placeholder="Share your prayer intention..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">
          <i class="fas fa-hands-praying"></i> Submit Prayer Request
        </button>
      </form>

      <!-- Success Message + Bible Verse (hidden by default) -->
      <div id="successMessage" class="hidden">
        <div class="success-box">
          <i class="fas fa-check-circle text-green-600 mr-1"></i>
          Submitted! Our Intercession Ministry will pray for you.
        </div>
        <div id="bibleVerseContainer" class="verse-card fade-in-up">
          <i class="fas fa-bible"></i>
          <div>
            <p id="verseText">"Trust in the Lord with all your heart and lean not on your own understanding."</p>
            <div class="ref" id="verseRef">— Proverbs 3:5</div>
          </div>
        </div>
      </div>

      <!-- Error message -->
      <div id="errorMessage" class="hidden"></div>
    </div>

    <!-- Footer scripture – minimal -->
    <div class="footer-verse">
      <i class="fas fa-quote-left mr-1"></i> Philippians 4:6
      <i class="fas fa-quote-right ml-1"></i>
    </div>
  </div>

  <script>
    // ============ BIBLE VERSES ============
    const bibleVerses = [
      { text: "Do not be anxious about anything, but in every situation, by prayer and petition, present your requests to God.", ref: "Philippians 4:6" },
      { text: "Cast all your anxiety on him because he cares for you.", ref: "1 Peter 5:7" },
      { text: "The Lord is close to the brokenhearted and saves those who are crushed in spirit.", ref: "Psalm 34:18" },
      { text: "Come to me, all you who are weary and burdened, and I will give you rest.", ref: "Matthew 11:28" },
      { text: "I can do all things through Christ who strengthens me.", ref: "Philippians 4:13" },
      { text: "Trust in the Lord with all your heart and lean not on your own understanding.", ref: "Proverbs 3:5" },
      { text: "Be strong and courageous. Do not be afraid; do not be discouraged, for the Lord your God will be with you wherever you go.", ref: "Joshua 1:9" },
      { text: "And we know that in all things God works for the good of those who love him, who have been called according to his purpose.", ref: "Romans 8:28" },
      { text: "Peace I leave with you; my peace I give you. I do not give to you as the world gives. Do not let your hearts be troubled and do not be afraid.", ref: "John 14:27" },
      { text: "But those who hope in the Lord will renew their strength. They will soar on wings like eagles; they will run and not grow weary, they will walk and not be faint.", ref: "Isaiah 40:31" },
      { text: "The Lord is my shepherd; I shall not want.", ref: "Psalm 23:1" },
      { text: "Pray without ceasing.", ref: "1 Thessalonians 5:17" },
      { text: "If my people, who are called by my name, will humble themselves and pray and seek my face and turn from their wicked ways, then I will hear from heaven, and I will forgive their sin and will heal their land.", ref: "2 Chronicles 7:14" },
      { text: "Therefore I tell you, whatever you ask for in prayer, believe that you have received it, and it will be yours.", ref: "Mark 11:24" },
      { text: "Ask and it will be given to you; seek and you will find; knock and the door will be opened to you.", ref: "Matthew 7:7" },
      { text: "The prayer of a righteous person is powerful and effective.", ref: "James 5:16" },
      { text: "I sought the Lord, and he answered me; he delivered me from all my fears.", ref: "Psalm 34:4" },
      { text: "Call to me and I will answer you and tell you great and unsearchable things you do not know.", ref: "Jeremiah 33:3" },
      { text: "My grace is sufficient for you, for my power is made perfect in weakness.", ref: "2 Corinthians 12:9" },
      { text: "For I know the plans I have for you, declares the Lord, plans to prosper you and not to harm you, plans to give you hope and a future.", ref: "Jeremiah 29:11" }
    ];

    function getRandomVerse() {
      return bibleVerses[Math.floor(Math.random() * bibleVerses.length)];
    }

    // Google Apps Script URL
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyDeJsRh3KAwCtwPv9CSLlW6gDQes4wA1WRLoI020_8uSDDLtwl7UOs8LsWFBDFEJNNeA/exec';

    const form = document.getElementById('prayerForm');
    const successDiv = document.getElementById('successMessage');
    const errorDiv = document.getElementById('errorMessage');
    const verseText = document.getElementById('verseText');
    const verseRef = document.getElementById('verseRef');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      successDiv.classList.add('hidden');
      errorDiv.classList.add('hidden');

      let name = document.getElementById('name').value.trim() || 'Anonymous';
      const prayerRequest = document.getElementById('prayerRequest').value.trim();

      if (!prayerRequest) {
        errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle mr-1"></i> Please enter your prayer request.';
        errorDiv.classList.remove('hidden');
        return;
      }

      const submitBtn = form.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
      submitBtn.disabled = true;

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name,
            prayerRequest,
            timestamp: new Date().toLocaleString()
          })
        });

        const verse = getRandomVerse();
        verseText.textContent = `"${verse.text}"`;
        verseRef.textContent = `— ${verse.ref}`;

        successDiv.classList.remove('hidden');
        const container = document.getElementById('bibleVerseContainer');
        container.classList.remove('fade-in-up');
        void container.offsetWidth;
        container.classList.add('fade-in-up');

        form.reset();
        // no scroll – everything stays in view

      } catch (err) {
        errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle mr-1"></i> Unable to submit. Please try again.';
        errorDiv.classList.remove('hidden');
      } finally {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
